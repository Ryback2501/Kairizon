name: PR Validation

on:
  pull_request:
    branches: [dev]

jobs:
  guard:
    name: Enforce PR targets dev
    runs-on: ubuntu-latest
    steps:
      - name: Fail if base branch is not dev
        if: github.base_ref != 'dev'
        run: |
          echo "ERROR: PRs must target the 'dev' branch. This PR targets '${{ github.base_ref }}'."
          exit 1

  ci:
    name: Typecheck, lint, test, build
    needs: guard
    uses: ./.github/workflows/ci-suite.yml

  auto-merge:
    name: Auto-merge on success
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      pull-requests: write
      contents: write
    steps:
      - name: Enable auto-merge
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge --squash --auto "${{ github.event.pull_request.number }}" --repo "${{ github.repository }}"
