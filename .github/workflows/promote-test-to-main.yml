name: Promote test to main (release PR)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 1.2.3 — no v prefix)"
        required: true
      release_notes:
        description: "Release notes (optional)"
        required: false
        default: ""

jobs:
  create-pr:
    name: Bump version and create release PR
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: test
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ inputs.version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Commit and push version bump
        run: |
          git add package.json
          git diff --staged --quiet || git commit -m "chore(config): bump version to ${{ inputs.version }}"
          git push origin test

      - name: Create release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          BODY="Release \`v${{ inputs.version }}\` — merging \`test\` into \`main\`."
          if [ -n "$RELEASE_NOTES" ]; then
            BODY="$BODY

          **Release notes:** $RELEASE_NOTES"
          fi

          EXISTING=$(gh pr list --base main --head test --state open --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Release PR #$EXISTING already exists — skipping creation"
          else
            gh pr create \
              --base main --head test \
              --title "Release v${{ inputs.version }}" \
              --body "$BODY"
          fi
