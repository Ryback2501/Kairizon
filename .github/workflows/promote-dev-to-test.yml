name: Promote dev to test

on:
  push:
    branches: [dev]

jobs:
  merge:
    name: Merge dev into test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Merge dev into test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin test
          git checkout test
          git merge origin/dev --no-edit -m "chore(ci): promote dev to test"
          git push origin test

  ci:
    name: CI
    needs: merge
    uses: ./.github/workflows/ci.yml
    with:
      ref: test

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: ci

    env:
      DATABASE_FILE: test.db
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6
        with:
          ref: test

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Set DATABASE_URL
        run: echo "DATABASE_URL=file:./data/$DATABASE_FILE" >> $GITHUB_ENV

      - name: Run database migrations
        run: npx prisma db push --force-reset

      - name: Build
        run: npm run build

      - name: Start app server
        run: node dist/server.js &

      - name: Wait for app to be ready
        run: timeout 30 sh -c 'until curl -sf http://localhost:3000/api/status -o /dev/null; do sleep 1; done'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  report-failure:
    name: Open bug issue on failure
    runs-on: ubuntu-latest
    needs: [ci, e2e]
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Open bug issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "CI failure on dev to test promotion (run ${{ github.run_id }})" \
            --label "bug" \
            --body "Promotion failed on run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).

          **Commit:** ${{ github.sha }}

          Check the Playwright report artifact for E2E failure details."
