name: Test Branch Tests

on:
  push:
    branches: [test]

jobs:
  full-suite:
    name: Full test suite (unit + integration + E2E)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kairizon
          POSTGRES_PASSWORD: kairizon
          POSTGRES_DB: kairizon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kairizon:kairizon@localhost:5432/kairizon_test
      NEXTAUTH_SECRET: ci-secret-placeholder
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: placeholder
      GOOGLE_CLIENT_SECRET: placeholder
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: test@example.com
      SMTP_PASS: placeholder
      SMTP_FROM: "Kairizon <test@example.com>"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Start app server
        run: node dist/server.js &

      - name: Wait for app to be ready
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-test-${{ github.run_id }}
          path: playwright-report/
          retention-days: 7

  report-failure:
    name: Open bug issue on failure
    runs-on: ubuntu-latest
    needs: full-suite
    if: failure()
    permissions:
      issues: write
    steps:
      - name: Open bug issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Test suite failure on test branch (run ${{ github.run_id }})" \
            --label "bug" \
            --assignee "${{ github.repository_owner }}" \
            --body "The test suite failed on the \`test\` branch.

          **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          **Commit:** ${{ github.sha }}

          Check the [Playwright report artifact](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for E2E failure details."
