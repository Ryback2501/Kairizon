name: Dev Branch Tests

on:
  push:
    branches: [dev]

jobs:
  ci:
    name: Typecheck, lint, test, build
    uses: ./.github/workflows/ci-suite.yml

  promote:
    name: Trigger promotion to test
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      actions: write
    steps:
      - name: Trigger promote-dev-to-test workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run promote-dev-to-test.yml \
            --repo "${{ github.repository }}" \
            --ref dev
