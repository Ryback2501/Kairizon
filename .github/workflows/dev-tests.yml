name: Dev Branch Tests

on:
  push:
    branches: [dev]

jobs:
  ci:
    name: Typecheck, lint, test, build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: kairizon
          POSTGRES_PASSWORD: kairizon
          POSTGRES_DB: kairizon_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://kairizon:kairizon@localhost:5432/kairizon_test
      NEXTAUTH_SECRET: ci-secret-placeholder
      NEXTAUTH_URL: http://localhost:3000
      GOOGLE_CLIENT_ID: placeholder
      GOOGLE_CLIENT_SECRET: placeholder
      SMTP_HOST: smtp.example.com
      SMTP_PORT: "587"
      SMTP_USER: test@example.com
      SMTP_PASS: placeholder
      SMTP_FROM: "Kairizon <test@example.com>"
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run database migrations
        run: npx prisma migrate deploy

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

      - name: Build
        run: npm run build

      - name: Security audit
        run: npm audit --audit-level=high

  promote:
    name: Trigger promotion to test
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      actions: write
    steps:
      - name: Trigger promote-dev-to-test workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run promote-dev-to-test.yml \
            --repo "${{ github.repository }}" \
            --ref dev
