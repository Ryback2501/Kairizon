name: CI

on:
  pull_request:
    branches: [dev, test, main]
  push:
    branches: [dev, test, main]


jobs:
  backend:
    name: Backend (typecheck, lint, test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: bouncer
          POSTGRES_PASSWORD: bouncer
          POSTGRES_DB: bouncer_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://bouncer:bouncer@localhost:5432/bouncer_test
      SESSION_SECRET: ci-session-secret-minimum-sixteen-chars
      FRONTEND_URL: http://localhost:5173
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Type check
        working-directory: backend
        run: npx tsc --noEmit

      - name: Lint
        working-directory: backend
        run: npm run lint

      - name: Run database migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: Run tests
        working-directory: backend
        run: npm run test:run

      - name: Build
        working-directory: backend
        run: npm run build

      - name: Security audit
        working-directory: backend
        run: npm audit --audit-level=high

  frontend:
    name: Frontend (typecheck, lint, test)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Type check
        working-directory: frontend
        run: npx tsc -b

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Security audit
        working-directory: frontend
        run: npm audit --audit-level=high
